<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 240" role="img" aria-label="NXT PERF logo">
  <defs>
    <style>
      :root{
        --nxt-navy:#162D62;
        --nxt-purple:#4A32A2;
        --white:#FFFFFF;
      }
      .wordmark{ font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; font-weight: 800; letter-spacing: -0.02em; }
    </style>
    <radialGradient id="perfGlow" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#5B45C4"/>
      <stop offset="55%" stop-color="#4A32A2"/>
      <stop offset="100%" stop-color="#3A2783"/>
    </radialGradient>
    <clipPath id="perfClip">
      <circle cx="150" cy="120" r="38"/>
    </clipPath>
  </defs>

  <!-- ICON -->
  <g transform="translate(40,20)">
    <!-- Triangle Play arrondi -->
    <path fill="var(--nxt-navy)" d="
      M 68 58
      Q 68 30 95 40
      L 258 113
      Q 280 120 258 127
      L 95 200
      Q 68 210 68 182
      Z
    "/>

    <!-- Anneau blanc -->
    <circle cx="150" cy="120" r="52" fill="var(--white)"/>
    <!-- Disque violet dégradé -->
    <circle cx="150" cy="120" r="38" fill="url(#perfGlow)"/>

    <!-- Graph performance animé (dans le disque) -->
    <g clip-path="url(#perfClip)">
      <g transform="translate(124,96)">
        <rect x="0" y="22" width="8" height="22" rx="3" fill="var(--white)" opacity="0.92">
          <animate attributeName="y" values="26;20;26" dur="1.2s" repeatCount="indefinite"/>
          <animate attributeName="height" values="18;24;18" dur="1.2s" repeatCount="indefinite"/>
        </rect>
        <rect x="14" y="14" width="8" height="30" rx="3" fill="var(--white)" opacity="0.92">
          <animate attributeName="y" values="18;10;18" dur="1.2s" begin="0.15s" repeatCount="indefinite"/>
          <animate attributeName="height" values="26;34;26" dur="1.2s" begin="0.15s" repeatCount="indefinite"/>
        </rect>
        <rect x="28" y="6" width="8" height="38" rx="3" fill="var(--white)" opacity="0.92">
          <animate attributeName="y" values="10;4;10" dur="1.2s" begin="0.3s" repeatCount="indefinite"/>
          <animate attributeName="height" values="34;40;34" dur="1.2s" begin="0.3s" repeatCount="indefinite"/>
        </rect>
        <rect x="42" y="18" width="8" height="26" rx="3" fill="var(--white)" opacity="0.92">
          <animate attributeName="y" values="22;14;22" dur="1.2s" begin="0.45s" repeatCount="indefinite"/>
          <animate attributeName="height" values="22;30;22" dur="1.2s" begin="0.45s" repeatCount="indefinite"/>
        </rect>
      </g>
      <!-- Point focus -->
      <circle cx="138" cy="108" r="4.2" fill="var(--white)" opacity="0.95"/>
    </g>
  </g>

  <!-- WORDMARK -->
  <g transform="translate(360,62)">
    <text class="wordmark" x="0" y="52" font-size="78" fill="var(--nxt-navy)">NXT</text>
    <text class="wordmark" x="0" y="132" font-size="78" fill="var(--nxt-purple)">PERF</text>
  </g>
</svg>
