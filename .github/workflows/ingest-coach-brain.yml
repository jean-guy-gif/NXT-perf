name: Coach Brain — Weekly Ingestion

on:
  schedule:
    # Dimanche 03:00 UTC (= dimanche 04:00 Europe/Paris en hiver, 05:00 en été)
    - cron: "0 3 * * 0"
  # Permet de déclencher manuellement depuis l'onglet Actions de GitHub.
  workflow_dispatch:

# Empêche deux runs simultanés (manual + cron au même moment).
concurrency:
  group: coach-brain-ingest
  cancel-in-progress: false

jobs:
  ingest:
    name: Run ingestion pipeline (limit=50)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run coach brain ingestion
        run: npm run ingest:coach-brain -- --limit 50
        env:
          COACH_BRAIN_DRIVE_FOLDER_ID: ${{ secrets.COACH_BRAIN_DRIVE_FOLDER_ID }}
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
